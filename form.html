<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    ,
    <script src="https://kit.fontawesome.com/caed80bde7.js" crossorigin="anonymous"></script>
    <title>Document</title>
</head>

<body>
    <div class="container mt-5">
        <div class="card border-secundary mb-3" style="max-width: 100%;">
            <div class="card-header bg-secundary border-secundary">Payment For Example</div>
            <!--cuerpo del formulario-->
            <div class="card-body text-success text-dark p-2">
                <div style="height: 50px; background-color: rgb(241, 202, 202)">some field are missing</div>
                <form>
                    <div class="row">
                        <div class="col-6">
                            <label for="cardN">card #</label>
                            <input type="text" class="form-control" placeholder="XXXXXXX" />
                        </div>
                        <div class="col-4">
                            <label for="CVC">CVC #</label>
                            <input type="text" class="form-control" placeholder="0000">
                        </div>
                        <div class="col-2">
                            <label for="cardN">Amount</label>
                            <input type="text" class="form-control" placeholder="Amount">
                        </div>
                    </div>
                </form>
                <form>
                    <div class="row">
                        <div class="col">
                            <label for="Name">First Name</label>
                            <input type="text" class="form-control" aria-placeholder="XXXXXXX" />
                        </div>
                        <div class="col">
                            <label for="Last">Last Name</label>
                            <input type="text" class="form-control" placeholder="0000">
                        </div>
                    </div>
                </form>
                <div class="row">
                    <div class="col-6">
                        <label for="inputCity">City</label>
                        <input type="text" class="form-control" id="inputCity">
                    </div>
                    <div class="col">
                        <label for="inputState">State</label>
                        <select id="inputState" class="form-control">
                            <option selected>Pick up state</option>
                            <option value="1">San Jose</option>
                            <option value="2">Alajuela</option>
                            <option value="3">Guana</option>
                        </select>
                    </div>
                    <div class="col">
                        <label for="inputZip">Postal Code</label>
                        <input type="text" class="form-control" id="inputZip">
                    </div>
                </div>
                <a>We accept: </a>
                <div class="row">
                    <div class="col-6 pl-3" id="creditcards">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="inlineCheckbox1" value="option1">
                            <label for="inlineCheckbox1" class="form-check-label"><i
                                    class="fab fa-cc-mastercard"></i></label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="inlineCheckbox2" value="option2">
                            <label for="inlineCheckbox1" class="form-check-label"><i class="fab fa-cc-visa"></i></label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="inlineCheckbox1" value="option3">
                            <label for="inlineCheckbox1" class="form-check-label"><i class="fab fa-cc-amex"></i></label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" id="inlineCheckbox1" value="option4">
                            <label for="inlineCheckbox1" class="form-check-label"><i
                                    class="fab fa-cc-diners-club"></i></label>
                        </div>
                    </div>
                    <div class="col-6 container">
                        <label for="comments">Mensaje</label>
                        <textarea class="form-control" id="form4Example3"></textarea>
                        <p class="text-secondary">add any notes here.</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-end bg-secondary border-secondary">
            <a href="#" class="btn btn-secondary btn-lg active" role="button" aria-pressed="true">Cancel</a>
            <a href="#" class="btn btn-primary btn-lg active" style="margin-left: 10px;" role="button"
                aria-pressed="true">Send</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
        crossorigin="anonymous"></script>
    </div>
</body>

</html>
